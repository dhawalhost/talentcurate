name: CI (Code Verification)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  verify-builds:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [api, worker, frontend]
        include:
          - component: api
            file: ./api.Dockerfile
          - component: worker
            file: ./worker.Dockerfile
          - component: frontend
            file: ./frontend/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image (Verification Only)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.file }}
          push: false
          load: true # Ensures image is built and loaded into Docker daemon for verification
