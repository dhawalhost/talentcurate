apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: talentcurate-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dhawalhost/talentcurate.git
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: talentcurate-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
